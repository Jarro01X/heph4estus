name: katana
description: Web crawling and spidering framework
exec: ["katana", "-list", "{{input}}", "-o", "{{output}}", "-j", "-silent"]
input_type: target_list
output_ext: jsonl
install_cmd: "go install github.com/projectdiscovery/katana/cmd/katana@v1.5.0"
default_cpu: 256
default_memory: 512
timeout: 15m
tags: [recon, web]
