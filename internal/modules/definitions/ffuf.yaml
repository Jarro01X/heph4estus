name: ffuf
description: Web fuzzer for directories, vhosts, parameters
exec: ["ffuf", "-w", "{{input}}", "-u", "{{target}}", "-of", "json", "-o", "{{output}}", "-ac"]
input_type: wordlist
output_ext: json
install_cmd: "go install github.com/ffuf/ffuf/v2@v2.1.0"
default_cpu: 256
default_memory: 512
timeout: 30m
tags: [fuzzer, web]
