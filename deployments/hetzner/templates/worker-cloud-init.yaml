#cloud-config
# Worker VM bootstrap — installs Docker, trusts the controller CA when TLS is
# enabled, pulls the worker image, and starts the worker as a systemd service.

package_update: true

packages:
  - ca-certificates
  - docker.io
  - jq

write_files:
%{ if registry_tls_enabled }
  # Trust the controller CA for Docker registry pulls and Heph runtime clients.
  - path: /etc/heph/controller-ca.crt
    permissions: '0644'
    encoding: b64
    content: ${controller_ca_pem_b64}

  - path: /usr/local/share/ca-certificates/heph-controller-ca.crt
    permissions: '0644'
    encoding: b64
    content: ${controller_ca_pem_b64}

  - path: /etc/docker/certs.d/${controller_host}:${registry_port}/ca.crt
    permissions: '0644'
    encoding: b64
    content: ${controller_ca_pem_b64}
%{ else }
  # Configure Docker to trust the controller's insecure registry
  - path: /etc/docker/daemon.json
    content: |
      {
        "insecure-registries": ["${controller_host}:${registry_port}"]
      }
%{ endif }

  # Worker systemd service
  - path: /etc/systemd/system/heph-worker.service
    content: |
      [Unit]
      Description=Heph4estus Worker
      After=docker.service
      Requires=docker.service

      [Service]
      Restart=always
      RestartSec=10
      ExecStartPre=-/usr/bin/docker rm -f heph-worker
      ExecStartPre=/bin/sh -c 'printf %s ${registry_password} | /usr/bin/docker login --username ${registry_username} --password-stdin ${controller_host}:${registry_port}'
      ExecStartPre=/usr/bin/docker pull ${controller_host}:${registry_port}/${docker_image}
      ExecStart=/usr/bin/docker run --name heph-worker \
        --add-host ${controller_host}:${controller_private_ip} \
        -e CLOUD=hetzner \
        -e QUEUE_URL=${nats_subject} \
        -e S3_BUCKET=${minio_bucket} \
        -e TOOL_NAME=${tool_name} \
        -e NATS_URL=${nats_scheme}://${nats_user}:${nats_password}@${controller_host}:${nats_port} \
        -e S3_ENDPOINT=${minio_scheme}://${controller_host}:${minio_port} \
        -e S3_REGION=us-east-1 \
        -e S3_ACCESS_KEY=${minio_access_key} \
        -e S3_SECRET_KEY=${minio_secret_key} \
        -e S3_PATH_STYLE=true \
%{ if registry_tls_enabled }
        -e HEPH_CONTROLLER_CA_FILE=/etc/heph/controller-ca.crt \
        -e HEPH_CONTROLLER_SERVER_NAME=${controller_host} \
        -v /etc/heph/controller-ca.crt:/etc/heph/controller-ca.crt:ro \
%{ endif }
        -e FLEET_HEARTBEAT=true \
        -e FLEET_GENERATION_ID=${generation_id} \
        -e WORKER_ID=heph-worker-${worker_index} \
        -e WORKER_HOST=${worker_private_ip} \
        -e WORKER_VERSION=${docker_image} \
        ${controller_host}:${registry_port}/${docker_image}
      ExecStop=/usr/bin/docker stop heph-worker

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /data /etc/heph
  - grep -q ' ${controller_host}$' /etc/hosts || echo '${controller_private_ip} ${controller_host}' >> /etc/hosts
%{ if registry_tls_enabled }
  - update-ca-certificates
%{ endif }
  - systemctl daemon-reload
  - systemctl enable --now docker

%{ if !registry_tls_enabled }
  # Restart Docker to pick up insecure registry config
  - systemctl restart docker
%{ endif }

  # Wait for controller registry to be reachable
  - |
    for i in $(seq 1 60); do
      curl -sf -u ${registry_username}:${registry_password} ${registry_scheme}://${controller_host}:${registry_port}/v2/ && break
      echo "Waiting for controller registry (attempt $i)..."
      sleep 5
    done

  # Start the worker service
  - systemctl enable --now heph-worker
