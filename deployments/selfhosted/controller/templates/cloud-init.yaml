#cloud-config
# Selfhosted controller bootstrap — installs Docker and starts NATS JetStream,
# MinIO, and a Docker registry as systemd-managed containers.
#
# This template is rendered by the controller Terraform module with credentials
# and port variables injected at plan time.

package_update: true

packages:
  - apache2-utils
  - docker.io
  - jq

write_files:
  # --- Controller TLS material ---
  - path: /data/tls/ca.crt
    permissions: '0644'
    encoding: b64
    content: ${controller_ca_pem_b64}

  - path: /data/tls/public.crt
    permissions: '0644'
    encoding: b64
    content: ${controller_cert_pem_b64}

  - path: /data/tls/private.key
    permissions: '0600'
    encoding: b64
    content: ${controller_key_pem_b64}

%{ if nats_mtls_enabled }
  - path: /data/nats/operator-client.crt
    permissions: '0600'
    encoding: b64
    content: ${nats_operator_cert_pem_b64}

  - path: /data/nats/operator-client.key
    permissions: '0600'
    encoding: b64
    content: ${nats_operator_key_pem_b64}

%{ endif }
  # --- MinIO role policies ---
  - path: /tmp/heph-minio-operator-policy.json
    permissions: '0600'
    content: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Action": ["s3:ListBucket"],
            "Resource": ["arn:aws:s3:::${minio_bucket}"]
          },
          {
            "Effect": "Allow",
            "Action": ["s3:GetObject", "s3:PutObject"],
            "Resource": ["arn:aws:s3:::${minio_bucket}/*"]
          }
        ]
      }

  - path: /tmp/heph-minio-worker-policy.json
    permissions: '0600'
    content: |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Allow",
            "Action": ["s3:GetObject", "s3:PutObject"],
            "Resource": ["arn:aws:s3:::${minio_bucket}/*"]
          }
        ]
      }

  # --- NATS auth configuration ---
  - path: /data/nats/auth.conf
    permissions: '0600'
    content: |
%{ if tls_enabled }
      tls {
        cert_file: "/tls/public.crt"
        key_file: "/tls/private.key"
        ca_file: "/tls/ca.crt"
%{ if nats_mtls_enabled }
        verify: true
%{ endif }
      }

%{ endif }
      authorization {
        users = [
          { user: "${nats_operator_user}", password: "${nats_operator_password}" },
          { user: "${nats_worker_user}", password: "${nats_worker_password}" }
        ]
      }

  # --- NATS JetStream ---
  - path: /etc/systemd/system/nats.service
    content: |
      [Unit]
      Description=NATS JetStream
      After=docker.service
      Requires=docker.service

      [Service]
      Restart=always
      RestartSec=5
      ExecStartPre=-/usr/bin/docker rm -f nats
      ExecStart=/usr/bin/docker run --name nats \
        -p ${nats_port}:4222 \
        -p ${nats_monitor_port}:8222 \
        -v /data/nats:/data \
        -v /data/tls:/tls:ro \
        nats:latest -js -sd /data -c /data/auth.conf
      ExecStop=/usr/bin/docker stop nats

      [Install]
      WantedBy=multi-user.target

  # --- MinIO ---
  - path: /etc/systemd/system/minio.service
    content: |
      [Unit]
      Description=MinIO Object Storage
      After=docker.service
      Requires=docker.service

      [Service]
      Restart=always
      RestartSec=5
      ExecStartPre=-/usr/bin/docker rm -f minio
      ExecStart=/usr/bin/docker run --name minio \
        -p ${minio_port}:9000 \
        -p ${minio_console_port}:9001 \
        -v /data/minio:/data \
%{ if tls_enabled }
        -v /data/tls:/root/.minio/certs:ro \
%{ endif }
        -e MINIO_ROOT_USER=${minio_root_access_key} \
        -e MINIO_ROOT_PASSWORD=${minio_root_secret_key} \
        minio/minio server /data --address :9000 --console-address :9001
      ExecStop=/usr/bin/docker stop minio

      [Install]
      WantedBy=multi-user.target

  # --- Docker Registry ---
  - path: /etc/systemd/system/registry.service
    content: |
      [Unit]
      Description=Docker Registry
      After=docker.service
      Requires=docker.service

      [Service]
      Restart=always
      RestartSec=5
      ExecStartPre=-/usr/bin/docker rm -f registry
      ExecStart=/usr/bin/docker run --name registry \
        -p ${registry_port}:5000 \
        -v /data/registry:/var/lib/registry \
        -v /data/registry-auth:/auth:ro \
        -e REGISTRY_AUTH=htpasswd \
        -e REGISTRY_AUTH_HTPASSWD_REALM=heph-controller \
        -e REGISTRY_AUTH_HTPASSWD_PATH=/auth/htpasswd \
%{ if tls_enabled }
        -v /data/tls:/certs:ro \
        -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/public.crt \
        -e REGISTRY_HTTP_TLS_KEY=/certs/private.key \
%{ endif }
        registry:2
      ExecStop=/usr/bin/docker stop registry

      [Install]
      WantedBy=multi-user.target

runcmd:
  - install -d -m 0755 /data/nats /data/minio /data/registry /data/tls
  - install -d -m 0700 /data/registry-auth
  - htpasswd -Bbn ${registry_publisher_user} ${registry_publisher_password} > /data/registry-auth/htpasswd
  - htpasswd -Bbn ${registry_worker_user} ${registry_worker_password} >> /data/registry-auth/htpasswd
  - chmod 0600 /data/registry-auth/htpasswd
  - systemctl daemon-reload
  - systemctl enable --now docker
  - systemctl enable --now nats
  - systemctl enable --now minio
  - systemctl enable --now registry

  # Bootstrap MinIO bucket — retry until MinIO is healthy.
  - |
    for i in $(seq 1 30); do
      docker run --rm --network host \
        %{ if tls_enabled }-v /data/tls/ca.crt:/root/.mc/certs/CAs/heph-controller-ca.crt:ro \
        %{ endif }-v /tmp/heph-minio-operator-policy.json:/operator-policy.json:ro \
        -v /tmp/heph-minio-worker-policy.json:/worker-policy.json:ro \
        --entrypoint sh minio/mc -c "
        mc alias set local ${minio_scheme}://localhost:${minio_port} ${minio_root_access_key} ${minio_root_secret_key} &&
        mc mb --ignore-existing local/${minio_bucket} &&
        (mc admin policy create local heph-operator /operator-policy.json || mc admin policy info local heph-operator >/dev/null) &&
        (mc admin policy create local heph-worker /worker-policy.json || mc admin policy info local heph-worker >/dev/null) &&
        (mc admin user info local ${minio_operator_access_key} >/dev/null 2>&1 || mc admin user add local ${minio_operator_access_key} ${minio_operator_secret_key}) &&
        (mc admin user info local ${minio_worker_access_key} >/dev/null 2>&1 || mc admin user add local ${minio_worker_access_key} ${minio_worker_secret_key}) &&
        mc admin policy attach local heph-operator --user ${minio_operator_access_key} &&
        mc admin policy attach local heph-worker --user ${minio_worker_access_key}
      " && break
      sleep 2
    done

  # Bootstrap NATS JetStream stream — retry until NATS is healthy.
  # Retention=WorkQueue ensures each message is delivered to exactly one worker.
  # max-deliver=3 acts as a dead-letter threshold (matches SQS DLQ semantics).
  # ack-wait=5m matches SQS visibility timeout for long-running scans.
  - |
    for i in $(seq 1 30); do
      docker run --rm --network host %{ if tls_enabled }-v /data/tls/ca.crt:/ca.crt:ro %{ endif }%{ if nats_mtls_enabled }-v /data/nats/operator-client.crt:/operator-client.crt:ro -v /data/nats/operator-client.key:/operator-client.key:ro %{ endif }natsio/nats-box nats %{ if tls_enabled }--tlsca=/ca.crt %{ endif }%{ if nats_mtls_enabled }--tlscert=/operator-client.crt --tlskey=/operator-client.key %{ endif }-s ${nats_scheme}://${nats_operator_user}:${nats_operator_password}@localhost:${nats_port} \
        stream add ${nats_stream_name} \
        --subjects="${nats_stream_name}.*" \
        --retention=work \
        --max-deliver=3 \
        --ack-wait=5m \
        --discard=old \
        --storage=file \
        --defaults && break
      sleep 2
    done
